# CI for kyberlib
#
# Per the v0.0.7 enterprise-upgrade plan (issue #141), the reusable workflow
# below is pinned to a commit SHA (not @main) — pinning to a moving branch
# is a supply-chain risk because the upstream branch could be hijacked.
# When bumping, update both the SHA and the comment date.
#
# The local jobs (cargo-deny, semver-checks, machete, reuse, msrv, no_std,
# vendor-build) compensate for what the reusable workflow does not yet cover.

name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
  pull_request:
    branches:
      - main
      - "feat/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

jobs:
  # ----------------------------------------------------------------------- lint
  # Local clippy + fmt gate. The reusable workflow (below) also runs
  # these, but we keep an explicit in-repo copy so the lint policy lives
  # next to the code that has to satisfy it — readers don't need to
  # cross-reference an external pipeline.
  lint:
    name: Lint (fmt + clippy strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@be73d7920c329f220ce78e0234b8f96b7ae60248
        with:
          toolchain: stable
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check
      - name: cargo clippy --workspace --all-targets -- -D warnings
        # `pedantic`, `nursery`, `cargo` cohorts are enabled at `warn`
        # in `[workspace.lints.clippy]` — keeping them out of `-D warnings`
        # for now so the gate doesn't flap on subjective lints. Re-evaluate
        # at v0.1 when the pedantic backlog is paid down.
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ------------------------------------------------------------------ reusable
  ci:
    name: Rust CI (reusable)
    # Pinned 2026-04-18 — pipelines: fix(rust-ci): use bash array for tarpaulin
    uses: sebastienrousseau/pipelines/.github/workflows/rust-ci.yml@99a39f7d02e76beb2b935fa07b7cd6a46d8bbc65
    with:
      rust-version: 'stable'
      run-clippy: true
      run-fmt: true
      run-audit: true
      run-coverage: true
      coverage-threshold: 80
    secrets: inherit

  # --------------------------------------------------------------------- local
  test-matrix:
    name: Test (${{ matrix.os }}, ${{ matrix.toolchain }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable]
        include:
          - os: ubuntu-latest
            toolchain: nightly
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.toolchain == 'nightly' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@be73d7920c329f220ce78e0234b8f96b7ae60248  # stable / nightly
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
      # `--locked` ensures we test the exact graph committed in
      # `Cargo.lock`. The workspace ships a cdylib (kyberlib-wasm) so the
      # lock file is part of the published surface — a CI run that
      # silently resolved a different graph would mask a publish-time
      # break.
      - name: Test (default features)
        run: cargo test --locked
      - name: Test (all features)
        run: cargo test --locked --all-features
      - name: Test (no default features + kyber768)
        run: cargo test --locked --lib --no-default-features --features kyber768

  msrv:
    name: MSRV (Rust 1.74)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@be73d7920c329f220ce78e0234b8f96b7ae60248
        with:
          toolchain: '1.74.0'
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      - name: Check (default features)
        run: cargo +1.74.0 check
      - name: Check (all features)
        run: cargo +1.74.0 check --all-features

  no-std:
    name: no_std build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@be73d7920c329f220ce78e0234b8f96b7ae60248
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      - name: Check no_std (lib only)
        run: cargo check --lib --no-default-features --features kyber768

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: EmbarkStudios/cargo-deny-action@e2f4ede4a4e60ea15ff31bc0647485d80c66cfba  # v2.0.4
        with:
          command: check
          arguments: --all-features

  semver-checks:
    name: cargo-semver-checks
    runs-on: ubuntu-latest
    # Soft-fail until v0.1 stabilises (Phase 3) — pre-1.0 patches are allowed
    # to break. Once on 0.1.x we'll flip this to a hard gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@be73d7920c329f220ce78e0234b8f96b7ae60248
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      - uses: obi1kenobi/cargo-semver-checks-action@6b69fcf40e9b5fb17adeb57e4b6ecd020649a239  # v2.9

  machete:
    name: cargo-machete (unused deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: bnjbvr/cargo-machete@b54422fa3319b3cac180f6030b663fe57af51635  # v0.7.0

  vendor-build:
    name: Vendor + offline build (air-gap simulation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@be73d7920c329f220ce78e0234b8f96b7ae60248
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      - name: cargo vendor
        run: |
          mkdir -p .cargo
          cargo vendor --versioned-dirs vendor > .cargo/config.toml.vendor
          cat >> .cargo/config.toml <<'EOF'
          [source.crates-io]
          replace-with = "vendored-sources"

          [source.vendored-sources]
          directory = "vendor"
          EOF
      - name: Offline build
        run: cargo build --offline --locked --all-features

  kyberslash-guard:
    name: KyberSlash regression guard (ADR 0003)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - run: bash scripts/kyberslash-guard.sh

  benches-compile:
    name: Benchmarks (compile-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@be73d7920c329f220ce78e0234b8f96b7ae60248
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      # Benches are gated on `--features benchmarking` and don't run on
      # PR (timing-sensitive on shared runners — see scripts/dudect.sh
      # for the CT-leak story). This job only compiles them so they
      # can't bit-rot silently.
      - name: cargo bench --no-run --features benchmarking
        run: cargo bench -p kyberlib --no-run --features benchmarking

  rustdoc:
    name: rustdoc (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@be73d7920c329f220ce78e0234b8f96b7ae60248
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      - name: cargo doc (strict)
        env:
          RUSTDOCFLAGS: >-
            -D warnings
            -D rustdoc::broken_intra_doc_links
            -D rustdoc::private_intra_doc_links
            -D rustdoc::invalid_codeblock_attributes
            -D rustdoc::invalid_html_tags
            -D rustdoc::bare_urls
        run: cargo doc --no-deps --all-features

  miri-focused:
    name: Miri (focused, per-PR)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@be73d7920c329f220ce78e0234b8f96b7ae60248
        with:
          toolchain: nightly
          components: miri
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      - run: bash scripts/miri.sh focused

  # ----------------------------------------------------------------- coverage
  # cargo-llvm-cov gives line + branch coverage in a single
  # instrumented build pass. Faster + more accurate than tarpaulin
  # for #[cfg(feature = ...)]-heavy code. The threshold gate fails
  # the PR when line coverage drops below the configured floor.
  coverage:
    name: Coverage (llvm-cov, gate >=80%)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      COVERAGE_THRESHOLD: 80
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@be73d7920c329f220ce78e0234b8f96b7ae60248
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@8f354f35e85e85d995c9b25cea25e0c6cdac9ec3  # v2.41.10
        with:
          tool: cargo-llvm-cov
      - name: Run coverage gate
        run: bash scripts/coverage.sh --ci
      - name: Upload to codecov
        uses: codecov/codecov-action@1e68e06f1dbfde0e4cefc87efeba9e4643565303  # v5.1.2
        if: always()
        with:
          files: target/coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  fuzz-smoke:
    name: Fuzz smoke (10s)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true   # Soft gate until corpus is seeded; tighten later.
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@be73d7920c329f220ce78e0234b8f96b7ae60248
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: 10-second smoke against fuzz_decap
        working-directory: fuzz
        run: cargo +nightly fuzz run fuzz_decap -- -runs=0 -max_total_time=10
