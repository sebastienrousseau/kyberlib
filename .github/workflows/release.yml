# Release pipeline for kyberlib.
#
# Triggered by a tag matching `v[0-9]+.[0-9]+.[0-9]+*` or by manual
# workflow_dispatch with `dry_run` set to `true` for rehearsal runs.
#
# Three stages:
#
#   1. validate — confirm the tag matches every workspace member's
#      Cargo.toml version, then run the full CI superset.
#   2. artifacts — `cargo package` each publishable crate, generate
#      SBOM + CycloneDX 1.6 CBOM, compute SHA-256 / SHA-512 sums,
#      attach SLSA L3 build provenance (Rekor transparency log), and
#      cosign-sign the .crate file (keyless via Fulcio + Rekor).
#   3. publish — upload to crates.io (skipped when dry_run = true),
#      create a GitHub Release with every artefact attached.
#
# Verification recipe for downstream consumers:
#
#   gh attestation verify --owner sebastienrousseau kyberlib-0.0.7.crate
#   cosign verify-blob \
#     --certificate-identity-regexp '^https://github\.com/sebastienrousseau/kyberlib/' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     --signature kyberlib-0.0.7.crate.sig \
#     --certificate kyberlib-0.0.7.crate.pem \
#     kyberlib-0.0.7.crate

name: Release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip crates.io publish + GitHub Release publish)'
        type: boolean
        default: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ===================================================================== validate
  validate:
    name: Validate tag + run CI superset
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
      is_dry_run: ${{ steps.dry_run.outputs.is_dry_run }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: dry_run
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "is_dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          else
            echo "is_dry_run=false" >> "$GITHUB_OUTPUT"
          fi

      - id: tag
        name: Derive version from tag (or fallback for dispatch)
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          else
            # Manual dispatch: read from the workspace-root Cargo.toml.
            # Member crates inherit via `version.workspace = true` and
            # don't have a literal version line to extract from.
            version=$(awk '
              /^\[workspace\.package\]/ { in_pkg = 1; next }
              /^\[/                      { in_pkg = 0 }
              in_pkg && /^version[[:space:]]*=/ {
                match($0, /"[^"]+"/);
                print substr($0, RSTART + 1, RLENGTH - 2);
                exit
              }
            ' Cargo.toml)
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $version"

      - uses: dtolnay/rust-toolchain@be73d7920c329f220ce78e0234b8f96b7ae60248
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Verify workspace version matches the tag
        env:
          EXPECTED: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          # Authoritative version is `[workspace.package].version` in the
          # workspace-root `Cargo.toml`. Every publishable member crate
          # inherits via `version.workspace = true`, so the source of
          # truth is the workspace value.
          actual=$(awk '
            /^\[workspace\.package\]/ { in_pkg = 1; next }
            /^\[/                      { in_pkg = 0 }
            in_pkg && /^version[[:space:]]*=/ {
              match($0, /"[^"]+"/);
              print substr($0, RSTART + 1, RLENGTH - 2);
              exit
            }
          ' Cargo.toml)
          echo "[workspace.package].version = $actual"
          echo "tag / dispatch input       = $EXPECTED"
          if [[ "$actual" != "$EXPECTED" ]]; then
            echo "::error::Tag $EXPECTED does not match workspace version $actual"
            exit 1
          fi
          # Sanity-check: every PUBLISHABLE crate uses `.workspace = true`.
          # Skip crates marked `publish = false` — they don't need to
          # track the workspace version (e.g. `xtask`, skeleton sidecars).
          for manifest in crates/*/Cargo.toml; do
            if grep -qE '^publish\s*=\s*false' "$manifest"; then
              echo "skip (publish=false): $manifest"
              continue
            fi
            if grep -qE '^version\s*=' "$manifest"; then
              echo "::error::$manifest declares its own version literal; expected version.workspace = true."
              exit 1
            fi
          done
          echo "OK — workspace version $actual matches every publishable member."

      # The release-pipeline validation gates run against each
      # workspace member's default features — same surface as
      # `cargo install kyberlib`. AVX2 / NASM / 90s features have
      # known pre-existing compile issues that don't affect the
      # default user surface; they're not gating for the release
      # pipeline. The broader cross-feature matrix lives in
      # `.github/workflows/ci.yml`'s `test-matrix` job.
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (default features)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test (default features)
        run: cargo test --workspace

      - name: cargo doc (strict, default features)
        env:
          RUSTDOCFLAGS: >-
            -D warnings
            -D rustdoc::broken_intra_doc_links
            -D rustdoc::private_intra_doc_links
            -D rustdoc::invalid_codeblock_attributes
            -D rustdoc::invalid_html_tags
            -D rustdoc::bare_urls
        run: cargo doc --no-deps --workspace

      # `cargo deny check` is intentionally omitted from the release
      # validate stage — it's a separate per-PR gate in `ci.yml` and
      # the rustsec/advisory-db has occasional transient malformed
      # entries (e.g. RUSTSEC-2026-0076.md, an upstream TOML parse
      # bug observed during a dry-run on 2026-05-19) that would block
      # a release for an unrelated reason. CI's cargo-deny gate
      # catches the same issues without coupling them to release
      # cadence.

  # ===================================================================== artifacts
  artifacts:
    name: Build + sign release artefacts
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # cosign keyless + SLSA OIDC
      attestations: write   # actions/attest-build-provenance
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@be73d7920c329f220ce78e0234b8f96b7ae60248
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Install supporting tools
        run: |
          cargo install cargo-cyclonedx --locked
          sudo apt-get update && sudo apt-get install -y jq

      - name: cargo package (kyberlib core)
        run: |
          mkdir -p dist
          # Package only the core crate in this step. `kyberlib-wasm`
          # has a path-dependency on `kyberlib = "<this version>"`
          # that `cargo package` resolves against crates.io. In a
          # dry-run, the new version isn't on the registry yet, so
          # `cargo package -p kyberlib-wasm` fails with
          # "no matching package found for kyberlib = ^0.0.7".
          # The publish job below handles the kyberlib-wasm packaging
          # AFTER `cargo publish -p kyberlib` lands the core on
          # crates.io. The SLSA + cosign attestation runs over the
          # one .crate file we can produce here.
          cargo package --no-verify -p kyberlib --target-dir target/
          cp target/package/kyberlib-*.crate dist/
          ls -la dist/

      - name: Generate SBOM (CycloneDX 1.5)
        run: |
          cargo cyclonedx --spec-version 1.5 --format json --override-filename sbom --all
          # cargo-cyclonedx writes per-crate sbom.cdx.json; collect them
          find . -name 'sbom.cdx.json' -exec cp {} dist/ \;

      - name: Generate CBOM (CycloneDX 1.6 with cryptoProperties)
        run: bash scripts/cbom.sh && cp target/cbom.cdx.json dist/

      - name: SHA-256 + SHA-512 checksums
        working-directory: dist
        run: |
          for f in *.crate *.json; do
            [ -e "$f" ] || continue
            shasum -a 256 "$f" >> SHA256SUMS
            shasum -a 512 "$f" >> SHA512SUMS
          done
          ls -la

      - name: SLSA L3 build provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: dist/*.crate

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Cosign keyless sign-blob (Fulcio + Rekor)
        working-directory: dist
        run: |
          # Cosign v3+ deprecated --output-signature / --output-certificate
          # in favour of --bundle which packs signature + certificate
          # into a single JSON file. Bundle format is what `cosign
          # verify-blob` expects when verifying.
          for crate in *.crate; do
            cosign sign-blob \
              --yes \
              --bundle "${crate}.cosign-bundle.json" \
              "$crate"
          done

      - name: Upload artefacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: release-artefacts
          path: dist/
          retention-days: 30

  # ===================================================================== publish
  publish:
    name: Publish (crates.io + GitHub Release)
    needs: [validate, artifacts]
    if: needs.validate.outputs.is_dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write       # GitHub Release creation
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@be73d7920c329f220ce78e0234b8f96b7ae60248
        with:
          toolchain: stable
      - uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806  # v4.1.9
        with:
          name: release-artefacts
          path: dist/

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_API_TOKEN }}
        run: |
          # Publish in dependency order. Each cargo-publish call honours
          # crates.io rate limits and waits for indexing where needed.
          cargo publish -p kyberlib --locked
          # kyberlib-wasm depends on kyberlib by path during dev — publish
          # requires the dep to resolve via the registry, so this needs
          # kyberlib's index entry to be live first. The 30s sleep is a
          # cushion; the real index propagation usually takes <10 s.
          sleep 30
          cargo publish -p kyberlib-wasm --locked

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file CHANGELOG.md \
            --draft \
            dist/*
