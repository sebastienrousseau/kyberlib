# cargo-vet config for kyberlib.
#
# `cargo vet` records third-party security audits for our dependencies.
# We import audits from trusted organisations rather than re-auditing
# everything ourselves; gaps are bootstrap-exempted with a `suggest = false`
# marker so they appear in `cargo vet suggest`'s queue rather than blocking
# the gate from day one.
#
# Run `cargo vet check` to verify the graph is fully covered. CI gates
# this in the cargo-vet job once #165 reaches its full population.

cargo-vet-version = "0.10"

# ---------------------------------------------------------------------- imports
# Audits imported from well-known organisations. We trust these for
# `safe-to-deploy` and `safe-to-run` criteria — read each entry's
# upstream policy before relying on it for new criteria.

[imports.bytecode-alliance]
url = "https://raw.githubusercontent.com/bytecodealliance/wasmtime/main/supply-chain/audits.toml"

[imports.embark-studios]
url = "https://raw.githubusercontent.com/EmbarkStudios/rust-ecosystem/main/audits.toml"

[imports.fermyon]
url = "https://raw.githubusercontent.com/fermyon/spin/main/supply-chain/audits.toml"

[imports.google]
url = "https://raw.githubusercontent.com/google/supply-chain/main/audits.toml"

[imports.isrg]
url = "https://raw.githubusercontent.com/divviup/libprio-rs/main/supply-chain/audits.toml"

[imports.mozilla]
url = "https://raw.githubusercontent.com/mozilla/supply-chain/main/audits.toml"

[imports.zcash]
url = "https://raw.githubusercontent.com/zcash/rust-ecosystem/main/supply-chain/audits.toml"

# ---------------------------------------------------------------------- policy
# Default criteria for the workspace.

[policy.kyberlib]
audit-as-crates-io = true
criteria = "safe-to-deploy"

[policy.kyberlib-asm]
audit-as-crates-io = true
criteria = "safe-to-deploy"

[policy.kyberlib-wasm]
audit-as-crates-io = true
criteria = "safe-to-deploy"

# ---------------------------------------------------------------------- exemptions
# Bootstrap exemptions: crates whose audit coverage isn't yet sufficient
# from our imports. `suggest = false` keeps `cargo vet suggest` from
# offering them up automatically — list them here so we remember to
# tackle them ourselves over time.
#
# Re-evaluate this list quarterly. The full population work is tracked
# in issue #165.

# Production deps with broad ecosystem trust but not always covered
# by every import set. Pinning by version so unexpected upgrades pull
# new vet decisions in.
[[exemptions.aes]]
version = "0.8.4"
criteria = "safe-to-deploy"
suggest = false

[[exemptions.ctr]]
version = "0.9.2"
criteria = "safe-to-deploy"
suggest = false

[[exemptions.rand]]
version = "0.8.6"
criteria = "safe-to-deploy"
suggest = false

[[exemptions.rand_core]]
version = "0.6.4"
criteria = "safe-to-deploy"
suggest = false

[[exemptions.sha2]]
version = "0.10.8"
criteria = "safe-to-deploy"
suggest = false

[[exemptions.zeroize]]
version = "1.7.0"
criteria = "safe-to-deploy"
suggest = false

[[exemptions.wasm-bindgen]]
version = "0.2.100"
criteria = "safe-to-deploy"
suggest = false

# Build deps. `safe-to-run` is the right criterion — these only execute
# at build time, never at the consumer's runtime.
[[exemptions.cc]]
version = "1.2.10"
criteria = "safe-to-run"
suggest = false

[[exemptions.nasm-rs]]
version = "0.3.0"
criteria = "safe-to-run"
suggest = false

# Dev deps. `safe-to-run` because they only enter test / bench binaries.
[[exemptions.criterion]]
version = "0.5.1"
criteria = "safe-to-run"
suggest = false

[[exemptions.serde]]
version = "1.0"
criteria = "safe-to-run"
suggest = false

[[exemptions.serde_json]]
version = "1.0"
criteria = "safe-to-run"
suggest = false

[[exemptions.wasm-bindgen-test]]
version = "0.3.43"
criteria = "safe-to-run"
suggest = false
