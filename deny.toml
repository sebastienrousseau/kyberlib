# cargo-deny configuration for kyberlib.
#
# Schema reference: https://embarkstudios.github.io/cargo-deny/checks/cfg.html
# Tracks the modern schema (cargo-deny ≥ 0.14). Run locally with:
#   cargo deny check
# CI runs `cargo deny check --all-features` on every PR (see ci.yml).

[graph]
all-features = true

[output]
feature-depth = 1

# ---------------------------------------------------------------------------- advisories
[advisories]
# RustSec database
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Yanked-from-crates.io: warn but do not fail (these often happen mid-release).
yanked = "warn"
# `ignore` allows known-accepted advisories.
ignore = [
    # ansi_term unmaintained — transitive via clap2/structopt-era tooling
    # (criterion / proptest / dudect-bencher pull this in for their CLI
    # arg parsing). Replacement (anstyle, nu-ansi-term) requires the
    # upstreams to migrate; kyberlib's own code does NOT use ansi_term.
    # No security impact (rendering-layer crate). Re-evaluate when our
    # dev-deps' major versions drop the dependency.
    { id = "RUSTSEC-2021-0139", reason = "transitive dev-dep only; no runtime exposure" },
    # atty unmaintained — same situation as ansi_term, replaced by
    # std::io::IsTerminal since Rust 1.70 but transitive dev-deps still
    # carry it.
    { id = "RUSTSEC-2024-0375", reason = "transitive dev-dep only; no runtime exposure" },
    # atty potential-unaligned-read (unsound) — Windows-only path; we
    # don't ship Windows binaries from this crate, and the dev-dep path
    # doesn't expose the vulnerable function.
    { id = "RUSTSEC-2021-0145", reason = "Windows-only, transitive dev-dep only" },
]

# ---------------------------------------------------------------------------- licenses
[licenses]
# Whitelist of permissive / OSI-approved licenses we accept upstream.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "CC0-1.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",            # ICU (used transitively by some date / locale crates)
    "Unlicense",              # memchr is dual Unlicense | MIT
    "Zlib",                   # rare, accept for now
]
# Confidence threshold for license-text matching.
confidence-threshold = 0.8
# Per-crate license clarifications (use sparingly).
exceptions = []

# ---------------------------------------------------------------------------- bans
[bans]
# Multiple versions of the same crate in the graph: warn (not deny) — Cargo
# resolves transitively and minor-version duplication is occasionally
# unavoidable. CI surfaces them so they can be tracked down.
multiple-versions = "warn"
# Wildcard version requirements are an attack surface — deny.
wildcards = "deny"
# Highlight all paths to duplicates.
highlight = "all"
# Explicit allow / deny lists (empty by default).
allow = []
deny = [
    # No crates currently banned. Add entries as:
    # { name = "openssl-sys", reason = "Use ring or aws-lc-rs instead" },
]
skip = []
skip-tree = []

# ---------------------------------------------------------------------------- sources
[sources]
# Reject unknown registries and unknown git sources. Procurement / EU CRA /
# FedRAMP buyers require this.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
