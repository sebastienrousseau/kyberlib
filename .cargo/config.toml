# `cargo xtask <subcommand>` — runs the workspace's internal
# release-pipeline tooling under `crates/xtask/`. Wraps every
# `scripts/*.sh` invocation in a Rust binary so contributors have
# a single, discoverable CLI surface.
[alias]
xtask = "run --quiet --package xtask --release --"
